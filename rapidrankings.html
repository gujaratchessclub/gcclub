<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Rapid Rankings — Gujarat Chess Club</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<!-- SheetJS for Excel export -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<!-- jsPDF for PDF export -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --blue:#1565C0;--blue-dk:#0D47A1;--blue-lt:#1976D2;
  --blue-pale:#E3F2FD;--bg:#F0F4FF;--white:#fff;
  --border:#BBDEFB;--text:#1A237E;--body:#37474F;--muted:#78909C;
  --gold:#FFB300;--green:#2E7D32;--green-bg:#E8F5E9;
  --red:#C62828;--red-bg:#FFEBEE;--orange:#E65100;
  --rank1:#FFD700;--rank2:#C0C0C0;--rank3:#CD7F32;
  --shadow:0 4px 24px rgba(21,101,192,.10);--r:14px;
}
body{font-family:'Lexend',sans-serif;background:var(--bg);min-height:100vh;color:var(--text);}
::-webkit-scrollbar{width:6px;height:6px;}
::-webkit-scrollbar-track{background:#f0f4ff;}
::-webkit-scrollbar-thumb{background:#BBDEFB;border-radius:3px;}

/* ══ HEADER ══ */
.header{
  background:linear-gradient(135deg,var(--blue-dk),var(--blue-lt));
  position:sticky;top:0;z-index:100;
  box-shadow:0 2px 16px rgba(13,71,161,.3);
}
.header-inner{
  max-width:1400px;margin:0 auto;
  display:flex;align-items:center;gap:14px;
  padding:10px 20px;flex-wrap:wrap;
}
.header-left{display:flex;flex-direction:column;gap:4px;min-width:160px;}
.date-pill{
  background:rgba(255,255,255,.18);color:#fff;
  font-size:12px;font-weight:600;padding:3px 12px;
  border-radius:20px;border:1px solid rgba(255,255,255,.28);
  display:inline-block;width:fit-content;
}
.admin-dl-btns{display:none;gap:5px;flex-wrap:wrap;margin-top:4px;}
.admin-dl-btns.on{display:flex;}
.admin-action-btn{
  font-family:'Lexend',sans-serif;
  background:rgba(255,255,255,.15);color:#fff;
  border:1px solid rgba(255,255,255,.35);border-radius:14px;
  padding:4px 11px;font-size:11px;font-weight:700;cursor:pointer;
}
.admin-action-btn:hover{background:rgba(255,255,255,.28);}

.header-logo-area{display:flex;align-items:center;gap:10px;flex:1;justify-content:center;}
.header-logo{font-size:34px;}
.header-titles{text-align:center;}
.header-club{font-size:20px;font-weight:800;color:#fff;}
.header-sub{font-size:13px;font-weight:600;color:rgba(255,255,255,.85);margin-top:1px;}
.ranking-month-badge{
  display:inline-block;background:var(--gold);color:var(--blue-dk);
  font-size:11px;font-weight:800;padding:2px 12px;border-radius:20px;
  margin-top:4px;letter-spacing:.5px;
}

.header-right{display:flex;align-items:center;gap:8px;min-width:160px;justify-content:flex-end;flex-wrap:wrap;}
.header-btn{
  font-family:'Lexend',sans-serif;background:rgba(255,255,255,.18);
  color:#fff;font-size:12px;font-weight:700;padding:6px 14px;
  border-radius:20px;border:1px solid rgba(255,255,255,.35);cursor:pointer;
}
.header-btn.admin-btn.active{background:#4CAF50;border-color:#4CAF50;}
.logout-btn{
  font-family:'Lexend',sans-serif;background:rgba(198,40,40,.85);
  color:#fff;font-size:12px;font-weight:700;padding:6px 14px;
  border-radius:20px;border:1px solid rgba(255,255,255,.3);cursor:pointer;
  display:none;
}
.logout-btn.on{display:inline-block;}
.nav-btn{
  font-family:'Lexend',sans-serif;background:var(--gold);
  color:var(--blue-dk);font-size:12px;font-weight:700;padding:6px 14px;
  border-radius:20px;border:none;cursor:pointer;
}
.nav-btn:hover{opacity:.88;}

/* ══ MAIN ══ */
.main{max-width:1400px;margin:0 auto;padding:18px 18px 60px;}

/* ══ FILTER BAR ══ */
.filter-bar{
  background:#fff;border-radius:var(--r);padding:16px 18px;
  margin-bottom:14px;box-shadow:var(--shadow);border:1px solid var(--border);
}
.filter-bar-title{font-size:12px;font-weight:700;color:var(--blue);text-transform:uppercase;letter-spacing:.8px;margin-bottom:10px;}
.filter-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:10px;}
.filter-group{display:flex;flex-direction:column;gap:3px;}
.filter-group label{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.4px;}
.filter-input,.filter-select{
  font-family:'Lexend',sans-serif;font-size:13px;padding:8px 10px;
  border:1.5px solid var(--border);border-radius:8px;background:#FAFCFF;
  color:var(--text);outline:none;width:100%;
}
.filter-input:focus,.filter-select:focus{border-color:var(--blue-lt);}
.filter-toggle-row{display:flex;flex-wrap:wrap;gap:7px;margin-top:12px;padding-top:12px;border-top:1px solid var(--blue-pale);}
.toggle-filter-btn{
  font-family:'Lexend',sans-serif;background:#F0F4FF;color:var(--blue-dk);
  border:1.5px solid var(--border);border-radius:20px;padding:7px 15px;
  font-size:12px;font-weight:700;cursor:pointer;transition:all .15s;
}
.toggle-filter-btn:hover{background:var(--blue-pale);border-color:var(--blue);}
.toggle-filter-btn.active{background:linear-gradient(135deg,var(--blue-dk),var(--blue-lt));color:#fff;border-color:var(--blue-dk);}
.filter-row2{display:flex;gap:8px;margin-top:10px;align-items:center;flex-wrap:wrap;}
.clear-filter-btn{
  font-family:'Lexend',sans-serif;background:var(--bg);color:var(--muted);
  border:1.5px solid var(--border);border-radius:20px;padding:7px 16px;
  font-size:12px;font-weight:600;cursor:pointer;
}
.result-count{margin-left:auto;font-size:12px;font-weight:600;color:var(--muted);background:var(--blue-pale);padding:5px 14px;border-radius:20px;}

/* ══ TABLE ══ */
.table-wrapper{background:#fff;border-radius:var(--r);box-shadow:var(--shadow);border:1px solid var(--border);overflow:auto;}
table{width:100%;border-collapse:collapse;font-size:13px;}
thead{position:sticky;top:0;z-index:10;}
thead tr{background:linear-gradient(135deg,var(--blue-dk),var(--blue-lt));}
thead th{
  color:#fff;font-size:11px;font-weight:700;text-transform:uppercase;
  letter-spacing:.5px;padding:11px 9px;text-align:left;white-space:nowrap;
}
tbody tr{border-bottom:1px solid #EEF2FF;transition:background .12s;}
tbody tr:hover{background:#F5F8FF;}
tbody td{padding:7px 9px;color:var(--body);vertical-align:middle;}

/* top 3 row highlights */
tbody tr.rank-1{background:linear-gradient(90deg,#FFF8E1,#FFFDE7) !important;}
tbody tr.rank-1:hover{background:linear-gradient(90deg,#FFF8E1,#FFFDE7) !important;}
tbody tr.rank-2{background:linear-gradient(90deg,#F5F5F5,#FAFAFA) !important;}
tbody tr.rank-2:hover{background:linear-gradient(90deg,#F5F5F5,#FAFAFA) !important;}
tbody tr.rank-3{background:linear-gradient(90deg,#FFF3E0,#FFF8F0) !important;}
tbody tr.rank-3:hover{background:linear-gradient(90deg,#FFF3E0,#FFF8F0) !important;}

/* PHOTO CELL */
.photo-cell{width:52px;padding:5px 6px !important;}
.photo-thumb{
  width:38px;height:48px;border-radius:5px;object-fit:cover;
  border:2px solid var(--border);cursor:pointer;display:block;
  box-shadow:0 2px 8px rgba(21,101,192,.13);transition:transform .18s;
}
.photo-thumb:hover{transform:scale(1.12);border-color:var(--blue);}
.photo-placeholder{
  width:38px;height:48px;border-radius:5px;
  background:linear-gradient(135deg,#E3F2FD,#BBDEFB);
  display:flex;align-items:center;justify-content:center;
  font-size:18px;border:2px dashed var(--border);
}

/* RANK cell */
.rank-cell{text-align:center;font-weight:800;font-size:14px;width:48px;}
.rank-medal{
  display:inline-flex;align-items:center;justify-content:center;
  width:32px;height:32px;border-radius:50%;font-size:16px;
}
.rank-medal.gold{background:radial-gradient(circle,#FFD700,#FFA000);box-shadow:0 2px 8px rgba(255,160,0,.4);}
.rank-medal.silver{background:radial-gradient(circle,#E8E8E8,#9E9E9E);box-shadow:0 2px 8px rgba(0,0,0,.18);}
.rank-medal.bronze{background:radial-gradient(circle,#FFCC80,#A1522A);box-shadow:0 2px 8px rgba(161,82,42,.3);}
.rank-num{font-weight:800;color:var(--blue-dk);}

/* STD RATING cell */
.std-rating{font-weight:800;font-size:14px;color:var(--blue-dk);}

.id-cell{font-size:12px;white-space:nowrap;}
.fide-link{color:var(--blue);font-weight:700;text-decoration:none;}
.fide-link:hover{text-decoration:underline;}
.ip-id-badge{background:var(--blue-pale);color:var(--blue-dk);font-size:10px;font-weight:700;padding:2px 8px;border-radius:10px;}
.t-badge{font-size:10px;font-weight:700;padding:2px 8px;border-radius:10px;display:inline-block;white-space:nowrap;}
.t-badge.player{background:#E8F5E9;color:#1B5E20;}
.name-cell{font-weight:600;min-width:140px;}
.action-cell{text-align:center;width:76px;}
.profile-btn{
  font-family:'Lexend',sans-serif;
  background:linear-gradient(135deg,var(--blue-dk),var(--blue-lt));
  color:#fff;border:none;border-radius:20px;
  padding:5px 11px;font-size:11px;font-weight:700;cursor:pointer;
}
.profile-btn:hover{opacity:.85;}

/* ══ LOADING ══ */
.loading-row td{text-align:center;padding:48px;color:var(--muted);}
.spinner{display:inline-block;width:32px;height:32px;border:3px solid var(--border);border-top-color:var(--blue);border-radius:50%;animation:spin .8s linear infinite;margin-bottom:8px;}
@keyframes spin{to{transform:rotate(360deg);}}

/* ══ TOAST ══ */
.toast{
  position:fixed;bottom:26px;left:50%;transform:translateX(-50%) translateY(16px);
  background:var(--blue-dk);color:#fff;font-size:13px;font-weight:700;
  padding:10px 22px;border-radius:24px;box-shadow:0 4px 20px rgba(0,0,0,.22);
  opacity:0;pointer-events:none;transition:all .28s;z-index:9999;white-space:nowrap;
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

/* ══ MODAL OVERLAY (shared) ══ */
.modal-overlay{
  display:none;position:fixed;inset:0;
  background:rgba(13,71,161,.50);z-index:2000;
  align-items:center;justify-content:center;padding:14px;
  backdrop-filter:blur(3px);
}
.modal-overlay.active{display:flex;}
.modal-box{
  background:#fff;border-radius:18px;width:100%;
  max-width:540px;max-height:92vh;overflow-y:auto;
  box-shadow:0 20px 60px rgba(0,0,0,.22);
  animation:pop .22s cubic-bezier(.34,1.56,.64,1);
}
@keyframes pop{from{transform:scale(.86);opacity:0;}to{transform:scale(1);opacity:1;}}
.modal-header{
  background:linear-gradient(135deg,var(--blue-dk),var(--blue-lt));
  padding:13px 18px;display:flex;align-items:center;
  justify-content:space-between;border-radius:18px 18px 0 0;
}
.modal-header h3{color:#fff;font-size:15px;font-weight:800;}
.modal-close{
  background:rgba(255,255,255,.22);color:#fff;border:none;
  border-radius:50%;width:28px;height:28px;font-size:15px;
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  font-family:'Lexend',sans-serif;flex-shrink:0;
}
.modal-close:hover{background:rgba(255,255,255,.38);}
.modal-body{padding:18px;}

/* ══ PIN MODAL ══ */
.pin-modal-box{max-width:360px;}
.pin-modal-body{text-align:center;padding:24px 20px;}
.pin-big-icon{font-size:42px;margin-bottom:8px;}
.pin-modal-body h4{font-size:16px;font-weight:800;color:var(--blue-dk);margin-bottom:5px;}
.pin-modal-body p{font-size:13px;color:var(--muted);margin-bottom:14px;}
.big-pin-input{
  font-family:'Lexend',sans-serif;width:100%;padding:12px;
  border:2px solid var(--border);border-radius:10px;
  font-size:18px;font-weight:800;letter-spacing:4px;text-align:center;
  outline:none;color:var(--text);background:#FAFCFF;margin-bottom:8px;
}
.big-pin-input:focus{border-color:var(--blue);}
.pin-err{color:var(--red);font-size:12px;font-weight:600;min-height:18px;margin:5px 0;}
.pin-modal-btns{display:flex;gap:10px;justify-content:center;margin-top:10px;}
.primary-btn{
  font-family:'Lexend',sans-serif;
  background:linear-gradient(135deg,var(--blue-dk),var(--blue-lt));
  color:#fff;border:none;border-radius:24px;padding:11px 26px;
  font-size:14px;font-weight:700;cursor:pointer;
}
.cancel-btn{
  font-family:'Lexend',sans-serif;background:var(--bg);color:var(--muted);
  border:1.5px solid var(--border);border-radius:24px;padding:10px 20px;
  font-size:13px;font-weight:600;cursor:pointer;
}

/* ══ PROFILE MODAL ══ */
.profile-modal-box{max-width:600px;}
.profile-top{display:flex;gap:14px;margin-bottom:14px;}
.profile-photo-wrap{flex-shrink:0;}
.prof-photo-sq{
  width:90px;height:114px;border-radius:8px;object-fit:cover;
  border:2px solid var(--border);cursor:pointer;display:block;
  box-shadow:0 3px 14px rgba(21,101,192,.15);
}
.profile-photo-placeholder{
  width:90px;height:114px;border-radius:8px;
  background:linear-gradient(135deg,#E3F2FD,#BBDEFB);
  display:flex;align-items:center;justify-content:center;
  font-size:38px;border:2px dashed var(--border);
}
.profile-info-main{flex:1;min-width:0;}
.profile-name{font-size:18px;font-weight:800;color:var(--text);margin-bottom:4px;}
.fide-link-lg{color:var(--blue);font-weight:700;text-decoration:none;font-size:13px;display:inline-block;margin-bottom:5px;}
.fide-link-lg:hover{text-decoration:underline;}
.profile-badges{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:6px;}
.profile-fields{display:grid;grid-template-columns:1fr 1fr;gap:5px 14px;}
.pf-item{display:flex;flex-direction:column;gap:1px;}
.pf-label{font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.4px;}
.pf-val{font-size:13px;font-weight:600;color:var(--body);}

/* LIGHTBOX */
.lightbox{display:none;position:fixed;inset:0;background:rgba(0,0,0,.88);z-index:3000;align-items:center;justify-content:center;cursor:zoom-out;}
.lightbox.active{display:flex;}
.lightbox img{max-width:90vw;max-height:86vh;border-radius:10px;box-shadow:0 8px 40px rgba(0,0,0,.5);}

/* ══ RESPONSIVE ══ */
@media(max-width:768px){
  .header-inner{padding:8px 12px;}
  .profile-fields{grid-template-columns:1fr;}
  .toggle-filter-btn{font-size:11px;padding:6px 11px;}
  .header-left{min-width:auto;}
  .header-right{min-width:auto;}
}
</style>
</head>
<body>

<header class="header">
  <div class="header-inner">
    <div class="header-left">
      <div class="date-pill" id="datePill"></div>
      <div class="admin-dl-btns" id="adminDlBtns">
        <button class="admin-action-btn" onclick="downloadExcel()">⬇ Excel</button>
        <button class="admin-action-btn" onclick="downloadPDF()">⬇ PDF</button>
      </div>
    </div>

    <div class="header-logo-area">
      <div class="header-logo">♟</div>
      <div class="header-titles">
        <div class="header-club">Gujarat Chess Club</div>
        <div class="header-sub">Rapid Rankings</div>
        <div class="ranking-month-badge" id="rankingMonthBadge"></div>
      </div>
    </div>

    <div class="header-right">
      <button class="nav-btn" onclick="window.location.href='IP.html'">👤 IP Database</button>
      <button class="logout-btn" id="logoutBtn" onclick="logoutAdmin()">🚪 Log Out</button>
      <button class="header-btn admin-btn" id="adminBtn" onclick="toggleAdminModal()">🔐 Admin</button>
    </div>
  </div>
</header>

<div class="main">

  <!-- FILTER BAR -->
  <div class="filter-bar">
    <div class="filter-bar-title">🔍 Search &amp; Filter</div>
    <div class="filter-grid">
      <div class="filter-group" style="grid-column:1/-1;">
        <label>Search (Name / FIDE ID / IP ID / AICF ID)</label>
        <input type="text" id="fSearch" class="filter-input" placeholder="Type to search…">
      </div>
      <div class="filter-group">
        <label>District</label>
        <select id="fDistrict" class="filter-select"><option value="">All Districts</option></select>
      </div>
      <div class="filter-group">
        <label>Gender</label>
        <select id="fGender" class="filter-select">
          <option value="">All</option>
          <option value="MALE">Male</option>
          <option value="FEMALE">Female</option>
        </select>
      </div>
      <div class="filter-group">
        <label>Rapid Rating From (min 1400)</label>
        <input type="number" id="fRatingFrom" class="filter-input" placeholder="e.g. 1400" min="1400">
      </div>
      <div class="filter-group">
        <label>Rapid Rating To</label>
        <input type="number" id="fRatingTo" class="filter-input" placeholder="e.g. 2500">
      </div>
      <div class="filter-group">
        <label>Birth Year From</label>
        <input type="number" id="fBirthFrom" class="filter-input" placeholder="e.g. 1990">
      </div>
      <div class="filter-group">
        <label>Birth Year To</label>
        <input type="number" id="fBirthTo" class="filter-input" placeholder="e.g. 2010">
      </div>
    </div>
    <div class="filter-toggle-row">
      <button class="toggle-filter-btn" id="btnTitled" onclick="toggleBtn('titled')">Titled Player</button>
      <button class="toggle-filter-btn" id="btnActive" onclick="toggleBtn('active')">Active</button>
      <button class="toggle-filter-btn" id="btnInactive" onclick="toggleBtn('inactive')">Inactive</button>
    </div>
    <div class="filter-row2">
      <button class="clear-filter-btn" onclick="clearFilters()">✕ Clear All</button>
      <span class="result-count" id="resultCount">— records</span>
    </div>
  </div>

  <!-- TABLE -->
  <div class="table-wrapper">
    <table id="rankTable">
      <thead>
        <tr>
          <th style="width:52px;">Photo</th>
          <th style="width:52px;text-align:center;">Rank</th>
          <th style="width:80px;">Rapid Rating</th>
          <th style="min-width:130px;">IP ID / FIDE ID</th>
          <th style="width:80px;">Title</th>
          <th style="min-width:150px;">Name</th>
          <th style="width:76px;">Birth Yr</th>
          <th style="width:70px;">Gender</th>
          <th style="width:110px;">District</th>
          <th style="width:76px;text-align:center;">Profile</th>
        </tr>
      </thead>
      <tbody id="tbody">
        <tr class="loading-row"><td colspan="10"><div class="spinner"></div><br>Loading Rapid Rankings…</td></tr>
      </tbody>
    </table>
  </div>

</div>

<!-- LIGHTBOX -->
<div class="lightbox" id="lightbox" onclick="closeLightbox()">
  <img id="lightboxImg" src="" alt="Photo">
</div>

<!-- ADMIN LOGIN MODAL -->
<div class="modal-overlay" id="adminModal">
  <div class="modal-box pin-modal-box">
    <div class="modal-header">
      <h3>🔐 Admin Login</h3>
      <button class="modal-close" onclick="closeModal('adminModal')">✕</button>
    </div>
    <div class="modal-body pin-modal-body">
      <div class="pin-big-icon">🛡️</div>
      <h4>Admin Login</h4>
      <p>Enter Admin ID and 6-digit PIN to unlock download.</p>
      <input type="text" id="adminIdInput" class="big-pin-input" placeholder="Admin ID" maxlength="30" autocomplete="off" style="letter-spacing:2px;text-transform:uppercase;">
      <input type="password" id="adminPinInput" class="big-pin-input" placeholder="Admin PIN (6 digits)" maxlength="6" inputmode="numeric" autocomplete="off">
      <div class="pin-err" id="adminPinErr"></div>
      <div class="pin-modal-btns">
        <button class="cancel-btn" onclick="closeModal('adminModal')">Cancel</button>
        <button class="primary-btn" onclick="confirmAdmin()">Enter</button>
      </div>
    </div>
  </div>
</div>

<!-- PROFILE MODAL -->
<div class="modal-overlay" id="profileModal">
  <div class="modal-box profile-modal-box">
    <div class="modal-header">
      <h3>👤 IP Profile</h3>
      <button class="modal-close" onclick="closeModal('profileModal')">✕</button>
    </div>
    <div class="modal-body" id="profileContent"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, getDocs, query, where } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBXrHcMJzQn3cxutg41LZs9oYwEfALe00s",
  authDomain: "ratedeventsgj.firebaseapp.com",
  projectId: "ratedeventsgj",
  storageBucket: "ratedeventsgj.firebasestorage.app",
  messagingSenderId: "527826897689",
  appId: "1:527826897689:web:fb0439fff04a695a599388"
};
const app = initializeApp(firebaseConfig);
const db  = getFirestore(app);
const DB_NAME = "IPdb";

let allData    = [];
let filtered   = [];
let adminMode  = false;

const DAYS   = ["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"];
const MONTHS = ["January","February","March","April","May","June","July","August","September","October","November","December"];
const MONTHS_SHORT = ["January","February","March","April","May","June","July","August","September","October","November","December"];

/* ── Date pill & ranking month badge ── */
function setDatePill(){
  const d = new Date();
  document.getElementById("datePill").textContent =
    `${DAYS[d.getDay()]}, ${d.getDate()} ${MONTHS[d.getMonth()]} ${d.getFullYear()}`;
  /* Ranking month = previous month */
  const prevMonth = new Date(d.getFullYear(), d.getMonth() - 1, 1);
  const label = `${MONTHS_SHORT[prevMonth.getMonth()].toUpperCase()} ${prevMonth.getFullYear()}`;
  document.getElementById("rankingMonthBadge").textContent = label;
}

/* ── Ranking month label string (for download headers) ── */
function getRankingMonthLabel(){
  const d = new Date();
  const prev = new Date(d.getFullYear(), d.getMonth() - 1, 1);
  return `${MONTHS_SHORT[prev.getMonth()]} ${prev.getFullYear()}`;
}

/* ── Toast ── */
function showToast(msg, ms=2600){
  const t = document.getElementById("toast");
  t.textContent = msg; t.classList.add("show");
  setTimeout(()=>t.classList.remove("show"), ms);
}

/* ── Admin verify ── */
async function verifyAdminCredentials(adminId, adminPin){
  const q = query(collection(db,"admindb"), where("adminid","==",adminId.toUpperCase()));
  const snap = await getDocs(q);
  if(snap.empty) return false;
  let ok = false;
  snap.forEach(d=>{ if(String(d.data().adminpin)===String(adminPin)) ok=true; });
  return ok;
}

/* ── Load data ── */
async function loadData(){
  document.getElementById("tbody").innerHTML =
    `<tr class="loading-row"><td colspan="10"><div class="spinner"></div><br>Loading Rapid Rankings…</td></tr>`;
  try{
    const snap = await getDocs(collection(db, DB_NAME));
    allData = snap.docs.map(d=>({_docId:d.id,...d.data()}))
      /* only keep records WITH a standard rating that is a valid 4-digit number */
      .filter(r=>{
        const v = String(r.rapidRating||"").trim();
        return /^\d{4}$/.test(v);
      });
    populateDistricts();
    applyFilter();
  }catch(e){
    document.getElementById("tbody").innerHTML =
      `<tr><td colspan="10" style="text-align:center;padding:40px;color:var(--red);">⚠️ Load error: ${e.message}</td></tr>`;
  }
}

function populateDistricts(){
  const list = [...new Set(allData.map(r=>(r.district||"").toUpperCase().trim()).filter(Boolean))].sort();
  const sel = document.getElementById("fDistrict");
  sel.innerHTML = `<option value="">All Districts</option>`;
  list.forEach(d=>{ const o=document.createElement("option"); o.value=d; o.textContent=d; sel.appendChild(o); });
}

/* ── Active filters state ── */
let activeFilters = { titled:false, active:false, inactive:false };

window.toggleBtn = function(key){
  /* active and inactive are mutually exclusive */
  if(key==="active" && activeFilters.inactive){ activeFilters.inactive=false; document.getElementById("btnInactive").classList.remove("active"); }
  if(key==="inactive" && activeFilters.active){ activeFilters.active=false; document.getElementById("btnActive").classList.remove("active"); }
  activeFilters[key] = !activeFilters[key];
  document.getElementById({titled:"btnTitled",active:"btnActive",inactive:"btnInactive"}[key]).classList.toggle("active", activeFilters[key]);
  applyFilter();
};

/* ── Apply filter ── */
function applyFilter(){
  const search = (document.getElementById("fSearch").value||"").trim().toLowerCase();
  const district = (document.getElementById("fDistrict").value||"");
  const gender = (document.getElementById("fGender").value||"");
  const rFrom = parseInt(document.getElementById("fRatingFrom").value||"0")||0;
  const rTo   = parseInt(document.getElementById("fRatingTo").value||"0")||0;
  const byFrom = parseInt(document.getElementById("fBirthFrom").value||"0")||0;
  const byTo   = parseInt(document.getElementById("fBirthTo").value||"0")||0;

  let data = [...allData];

  /* search */
  if(search) data = data.filter(r=>
    [(r.name||""),(r.fideId||""),(r.ipId||""),(r.aicfId||"")]
      .map(v=>v.toLowerCase()).some(v=>v.includes(search))
  );

  if(district) data = data.filter(r=>(r.district||"").toUpperCase()===district);
  if(gender)   data = data.filter(r=>(r.gender||"").toUpperCase()===gender);

  /* rating range — enforce 1400 minimum on From */
  if(rFrom){
    const from = Math.max(rFrom, 1400);
    data = data.filter(r=>parseInt(r.rapidRating||0)>=from);
  }
  if(rTo) data = data.filter(r=>parseInt(r.rapidRating||0)<=rTo);

  /* birth year */
  if(byFrom) data = data.filter(r=>{ const y=parseInt(r.birthYear||0); return !y||y>=byFrom; });
  if(byTo)   data = data.filter(r=>{ const y=parseInt(r.birthYear||0); return !y||y<=byTo; });

  /* toggle filters */
  if(activeFilters.titled)   data = data.filter(r=>(r.title||"").trim());
  if(activeFilters.active)   data = data.filter(r=>(r.status||"").toUpperCase()==="ACTIVE");
  if(activeFilters.inactive) data = data.filter(r=>(r.status||"").toUpperCase()==="INACTIVE");

  /* Sort descending by rapidRating */
  data.sort((a,b)=>parseInt(b.rapidRating||0)-parseInt(a.rapidRating||0));

  filtered = data;
  document.getElementById("resultCount").textContent = `${filtered.length} records`;
  renderTable();
}

/* ── Build active filter label string for download ── */
function getFilterLabel(){
  const parts = [];
  const search = (document.getElementById("fSearch").value||"").trim();
  const district = document.getElementById("fDistrict").value;
  const gender = document.getElementById("fGender").value;
  const rFrom = document.getElementById("fRatingFrom").value;
  const rTo = document.getElementById("fRatingTo").value;
  const byFrom = document.getElementById("fBirthFrom").value;
  const byTo = document.getElementById("fBirthTo").value;
  if(search) parts.push(`Search: ${search}`);
  if(district) parts.push(district);
  if(gender) parts.push(gender==="MALE"?"Male":"Female");
  if(rFrom||rTo) parts.push(`Rating ${rFrom||"1400"}–${rTo||"max"}`);
  if(byFrom||byTo) parts.push(`Born ${byFrom||""}–${byTo||""}`);
  if(activeFilters.titled) parts.push("Titled");
  if(activeFilters.active) parts.push("Active");
  if(activeFilters.inactive) parts.push("Inactive");
  return parts.join(", ");
}

window.clearFilters = function(){
  ["fSearch","fRatingFrom","fRatingTo","fBirthFrom","fBirthTo"].forEach(id=>{
    const e=document.getElementById(id); if(e) e.value="";
  });
  ["fGender","fDistrict"].forEach(id=>{
    const e=document.getElementById(id); if(e) e.value="";
  });
  Object.keys(activeFilters).forEach(k=>activeFilters[k]=false);
  ["btnTitled","btnActive","btnInactive"].forEach(id=>{
    const b=document.getElementById(id); if(b) b.classList.remove("active");
  });
  applyFilter();
};

/* ── Render table ── */
function isFideNum(id){ return id?/^\d+$/.test(id.trim()):false; }

function rankClass(rank){
  if(rank===1) return "rank-1";
  if(rank===2) return "rank-2";
  if(rank===3) return "rank-3";
  return "";
}
function rankCell(rank){
  if(rank===1) return `<div class="rank-medal gold">🥇</div>`;
  if(rank===2) return `<div class="rank-medal silver">🥈</div>`;
  if(rank===3) return `<div class="rank-medal bronze">🥉</div>`;
  return `<span class="rank-num">${rank}</span>`;
}

function renderTable(){
  const tbody = document.getElementById("tbody");
  tbody.innerHTML = "";
  if(!filtered.length){
    tbody.innerHTML = `<tr><td colspan="10" style="text-align:center;padding:48px;color:var(--muted);">No records found.</td></tr>`;
    return;
  }
  filtered.forEach((row, i)=>{
    const rank = i + 1;
    const tr = document.createElement("tr");
    if(rank<=3) tr.className = rankClass(rank);

    const rawId = row.ipId||row.fideId||"";
    const idHTML = isFideNum(rawId)
      ? `<a class="fide-link" href="https://ratings.fide.com/profile/${rawId}" target="_blank" rel="noopener">${rawId}</a>`
      : `<span class="ip-id-badge">${rawId||"—"}</span>`;

    const photoCell = row.pageURL
      ? `<img src="${row.pageURL}" class="photo-thumb" alt="Photo" onclick="openLightbox('${row.pageURL}')">`
      : `<div class="photo-placeholder">👤</div>`;

    const titleBadge = row.title
      ? `<span class="t-badge player">${row.title}</span>`
      : `<span style="color:var(--muted);">—</span>`;

    tr.innerHTML = `
      <td class="photo-cell">${photoCell}</td>
      <td class="rank-cell">${rankCell(rank)}</td>
      <td><span class="std-rating">${row.rapidRating}</span></td>
      <td class="id-cell">${idHTML}</td>
      <td>${titleBadge}</td>
      <td class="name-cell">${row.name||'<span style="color:var(--muted);font-style:italic;">—</span>'}</td>
      <td>${row.birthYear||"—"}</td>
      <td>${row.gender||"—"}</td>
      <td>${row.district||"—"}</td>
      <td class="action-cell"><button class="profile-btn" onclick="openProfile('${row._docId}')">👤 Profile</button></td>
    `;
    tbody.appendChild(tr);
  });
}

    : `<div class="profile-photo-placeholder">👤</div>`;

    {l:"IP ID",        v:row.ipId||"—"},
    {l:"FIDE ID",      v:isFideNum(row.fideId||"")?`<a class="fide-link-lg" href="https://ratings.fide.com/profile/${row.fideId}" target="_blank">${row.fideId}</a>`:(row.fideId||"—")},
    {l:"AICF ID",      v:row.aicfId||"—"},
    {l:"Birth Year",   v:row.birthYear||"—"},
    {l:"Gender",       v:row.gender||"—"},
    {l:"District",     v:row.district||"—"},
    {l:"Status",       v:row.status||"—"},
    {l:"Std Rating",   v:row.stdRating||"—"},
    {l:"Rapid Rating", v:row.rapidRating||"—"},
    {l:"Blitz Rating", v:row.blitzRating||"—"},
    {l:"Title",        v:row.title||"—"},
    {l:"Arbiter Title",v:row.arbiterTitle||"—"},
    {l:"Trainer Title",v:row.trainerTitle||"—"},
    {l:"Arena Title",  v:row.arenaTitle||"—"},
    {l:"Date of Birth",v:row.dobRaw||row.dob?"••/••/••••":"—"},
    {l:"Contact No",   v:row.contactNo?"•••"+String(row.contactNo).slice(-3):"—"},
    {l:"Email",        v:row.email?"•••"+row.email.slice(Math.max(0,row.email.indexOf("@")-2)):"—"},
    {l:"Lichess ID",   v:row.lichessId?"•••"+String(row.lichessId).slice(-2):"—"},
    {l:"Chess.com ID", v:row.chesscomId?"•••"+String(row.chesscomId).slice(-2):"—"},
    {l:"IP PIN",       v:"••••••"},
  ];

  const badges = [];
  if(row.title)        badges.push(`<span class="t-badge player">${row.title}</span>`);
  if(row.arbiterTitle) badges.push(`<span class="t-badge" style="background:#E3F2FD;color:#0D47A1;">${row.arbiterTitle}</span>`);
  if(row.trainerTitle) badges.push(`<span class="t-badge" style="background:#FFF3E0;color:#E65100;">${row.trainerTitle}</span>`);
  if(row.arenaTitle)   badges.push(`<span class="t-badge" style="background:#F3E5F5;color:#6A1B9A;">${row.arenaTitle}</span>`);

  document.getElementById("profileContent").innerHTML = `
    <div class="profile-top">
      <div class="profile-photo-wrap">${photoContent}</div>
      <div class="profile-info-main">
        <div class="profile-name">${row.name||"—"}</div>
        <div class="profile-badges">${badges.join("")}</div>

    </div>
    <div class="profile-fields">${fields.map(f=>`<div class="pf-item"><span class="pf-label">${f.l}</span><span class="pf-val">${f.v}</span></div>`).join("")}</div>
  `;

/* ── Admin ── */
window.toggleAdminModal = function(){
  if(adminMode){ logoutAdmin(); return; }
  document.getElementById("adminIdInput").value = "";
  document.getElementById("adminPinInput").value = "";
  document.getElementById("adminPinErr").textContent = "";
  document.getElementById("adminModal").classList.add("active");
  setTimeout(()=>document.getElementById("adminIdInput").focus(), 80);
};

window.confirmAdmin = async function(){
  const adminId  = document.getElementById("adminIdInput").value.trim();
  const adminPin = document.getElementById("adminPinInput").value.trim();
  const errEl    = document.getElementById("adminPinErr");
  if(!adminId){ errEl.textContent="❌ Enter Admin ID."; return; }
  if(!adminPin){ errEl.textContent="❌ Enter Admin PIN."; return; }
  errEl.textContent = "⏳ Verifying…";
  try{
    const ok = await verifyAdminCredentials(adminId, adminPin);
    if(ok){
      adminMode = true;
      document.getElementById("adminModal").classList.remove("active");
      document.getElementById("adminBtn").textContent = "🔓 Admin ON";
      document.getElementById("adminBtn").classList.add("active");
      document.getElementById("adminDlBtns").classList.add("on");
      document.getElementById("logoutBtn").classList.add("on");
      showToast("✅ Admin logged in. Download enabled.");
    } else {
      errEl.textContent = "❌ Wrong Admin ID or PIN.";
    }
  }catch(e){ errEl.textContent = "❌ Connection error."; }
};

window.logoutAdmin = function(){
  adminMode = false;
  document.getElementById("adminBtn").textContent = "🔐 Admin";
  document.getElementById("adminBtn").classList.remove("active");
  document.getElementById("adminDlBtns").classList.remove("on");
  document.getElementById("logoutBtn").classList.remove("on");
};

window.closeModal = function(id){ document.getElementById(id).classList.remove("active"); };

/* ── Admin PIN input — digits only, enter key ── */
document.getElementById("adminPinInput").addEventListener("input", function(){ this.value=this.value.replace(/\D/g,""); });
document.getElementById("adminIdInput").addEventListener("input", function(){ this.value=this.value.toUpperCase(); });
document.getElementById("adminPinInput").addEventListener("keydown", e=>{ if(e.key==="Enter") window.confirmAdmin(); });
document.getElementById("adminIdInput").addEventListener("keydown", e=>{ if(e.key==="Enter") document.getElementById("adminPinInput").focus(); });

/* ── Rating filter enforcement ── */
document.getElementById("fRatingFrom").addEventListener("change", function(){
  const v = parseInt(this.value)||0;
  if(v && v < 1400) this.value = 1400;
  /* enforce exactly 4 digits */
  if(v && (String(v).length < 4 || String(v).length > 4)){
    if(v < 1000) this.value = "";
    else if(v > 9999) this.value = 9999;
  }
  applyFilter();
});
document.getElementById("fRatingTo").addEventListener("change", function(){
  const v = parseInt(this.value)||0;
  if(v && (String(v).length < 4 || String(v).length > 4)){
    if(v < 1000) this.value = "";
    else if(v > 9999) this.value = 9999;
  }
  applyFilter();
});

/* ── Wire up filter events ── */
["fSearch","fBirthFrom","fBirthTo"].forEach(id=>{
  document.getElementById(id).addEventListener("input",()=>applyFilter());
});
["fGender","fDistrict"].forEach(id=>{
  document.getElementById(id).addEventListener("change",()=>applyFilter());

/* ══════════════════════════════════
   EXCEL DOWNLOAD
══════════════════════════════════ */
window.downloadExcel = function(){
  if(!adminMode){ showToast("❌ Admin login required."); return; }
  const { line1, line2, line3, line4 } = getDownloadHeaders();

  const wb = XLSX.utils.book_new();
  const rows = [];

  /* Header rows */
  rows.push([line1]);
  rows.push([line2]);
  rows.push([line3]);
  if(line4) rows.push([line4]);
  rows.push([]); /* spacer */

  /* Column headers */
  rows.push(["Rank","Rapid Rating","FIDE ID / IP ID","Title","Name","Birth Year","Gender","District"]);

  /* Data rows */
  filtered.forEach((row, i)=>{
    rows.push([
      i+1,
      row.rapidRating||"",
      row.fideId||row.ipId||"",
      row.title||"",
      row.name||"",
      row.birthYear||"",
      row.gender||"",
      row.district||"",
    ]);
  });

  const ws = XLSX.utils.aoa_to_sheet(rows);

  /* Column widths */
  ws["!cols"] = [
    {wch:6},{wch:12},{wch:14},{wch:10},{wch:28},{wch:10},{wch:8},{wch:16}
  ];

  /* Style header rows — blue background bold */
  const headerRowCount = line4 ? 4 : 3;
  for(let r=0; r<headerRowCount; r++){
    const cell = ws[XLSX.utils.encode_cell({r,c:0})];
    if(cell){
      cell.s = {
        font:{bold:true, sz:r===0?14:r===1?12:11, color:{rgb:"FFFFFF"}},
        fill:{fgColor:{rgb:"0D47A1"}},
        alignment:{horizontal:"center"}
      };
    }
  }

  /* Spacer row index */
  const dataStart = (line4?4:3)+2; /* headers + spacer + col-headers row */

  /* Color top 3 data rows */
  const topColors = {0:"FFF8E1", 1:"F5F5F5", 2:"FFF3E0"};
  for(let ri=0; ri<Math.min(3,filtered.length); ri++){
    const wsRow = dataStart + ri;
    for(let ci=0; ci<8; ci++){
      const cellRef = XLSX.utils.encode_cell({r:wsRow, c:ci});
      if(!ws[cellRef]) continue;
      ws[cellRef].s = {
        fill:{fgColor:{rgb:topColors[ri]}},
        font:{bold:true},
        alignment:{horizontal:ci===0?"center":"left"}
      };
    }
  }

  XLSX.utils.book_append_sheet(wb, ws, "Rapid Rankings");
  const fname = `rapidrankings_${new Date().toISOString().slice(0,10)}.xlsx`;
  XLSX.writeFile(wb, fname);
  showToast(`✅ Downloaded ${filtered.length} records.`);
};

/* ══════════════════════════════════
   PDF DOWNLOAD  —  Portrait A4, 30 rows/page, page numbers
══════════════════════════════════ */
window.downloadPDF = function(){
  if(!adminMode){ showToast("❌ Admin login required."); return; }
  const { jsPDF } = window.jspdf;

  /* Portrait A4: 210 x 297 mm */
  const doc = new jsPDF({ orientation:"portrait", unit:"mm", format:"a4" });

  const { line1, line2, line3, line4 } = getDownloadHeaders();

  /* ── Page width helpers ── */
  const PW   = 210;          /* page width mm  */
  const ML   = 10;           /* left margin    */
  const MR   = 10;           /* right margin   */
  const TW   = PW - ML - MR; /* usable table width = 190mm */

  /* ── Draw header block on a given page ── */
  function drawHeader(pageDoc){
    /* Blue header background */
    pageDoc.setFillColor(13, 71, 161);
    pageDoc.rect(0, 0, PW, 36, "F");

    pageDoc.setTextColor(255, 255, 255);

    /* Line 1 — Club name */
    pageDoc.setFont("helvetica","bold");
    pageDoc.setFontSize(15);
    pageDoc.text(line1, PW/2, 11, {align:"center"});

    /* Line 2 — Standard Rankings */
    pageDoc.setFont("helvetica","normal");
    pageDoc.setFontSize(11);
    pageDoc.text(line2, PW/2, 19, {align:"center"});

    /* Line 3 — Month Year */
    pageDoc.setFontSize(10);
    pageDoc.text(line3, PW/2, 26, {align:"center"});

    /* Line 4 — Filter label (optional) */
    if(line4){
      pageDoc.setFontSize(8);
      pageDoc.text("Filter: " + line4, PW/2, 32, {align:"center"});
    }

    pageDoc.setTextColor(55, 71, 79); /* reset text color */
  }

  /* Draw header on first page */
  drawHeader(doc);

  /* ── Table data ── */
  const head = [["Rank","Rapid Rating","FIDE ID / IP ID","Title","Name","Birth Yr","Gender","District"]];
  const body = filtered.map((row,i)=>[
    i+1,
    row.rapidRating||"",
    row.fideId||row.ipId||"",
    row.title||"",
    row.name||"",
    row.birthYear||"",
    (row.gender||"").toUpperCase()==="FEMALE"?"F":(row.gender||"").toUpperCase()==="MALE"?"M":(row.gender||""),
    row.district||"",
  ]);

  /* Top 3 highlight fills */
  const topFills = [
    [255,248,220],  /* rank 1 — gold tint   */
    [240,240,240],  /* rank 2 — silver tint */
    [255,237,213],  /* rank 3 — bronze tint */
  ];

  /* Track total pages for footer */
  let totalPages = 0;

  doc.autoTable({
    head,
    body,
    startY: line4 ? 39 : 38,

    /* 30 rows per page hard limit */
    rowPageBreak: "auto",
    pageBreak: "auto",

    styles:{
      font:"helvetica",
      fontSize:7.5,
      cellPadding:{top:1.6, right:1.8, bottom:1.6, left:1.8},
      textColor:[55,71,79],
      overflow:"linebreak",
      lineColor:[187,222,251],
      lineWidth:0.1,
    },
    headStyles:{
      fillColor:[13,71,161],
      textColor:[255,255,255],
      fontStyle:"bold",
      fontSize:7.5,
      halign:"center",
      cellPadding:{top:2.5, right:1.8, bottom:2.5, left:1.8},
    },
    alternateRowStyles:{
      fillColor:[240,244,255],
    },

    /* Column widths — must total = TW (190mm) */
    columnStyles:{
      0:{halign:"center", cellWidth:11},   /* Rank        */
      1:{halign:"center", cellWidth:19},   /* Rapid Rating */
      2:{halign:"left",   cellWidth:30},   /* FIDE/IP ID  */
      3:{halign:"center", cellWidth:13},   /* Title       */
      4:{halign:"left",   cellWidth:60},   /* Name        */
      5:{halign:"center", cellWidth:14},   /* Birth Yr    */
      6:{halign:"center", cellWidth:8},    /* Gender M/F  */
      7:{halign:"left",   cellWidth:35},   /* District    */
    },                                     /* Total = 190 ✓ */

    margin:{left:ML, right:MR, top:40},

    /* Highlight top 3 rows */
    didParseCell: function(data){
      if(data.section==="body" && data.row.index < 3){
        data.cell.styles.fillColor = topFills[data.row.index];
        data.cell.styles.fontStyle = "bold";
      }
    },

    /* On each new page: redraw header + count pages */
    didDrawPage: function(data){
      totalPages = doc.getNumberOfPages();

      /* Draw header on pages 2+ */
      if(data.pageNumber > 1){
        drawHeader(doc);
        /* push table start down so it doesn't overlap header */
        /* autoTable handles this via margin, but we set startY only for p1 */
      }

      /* Page number footer — bottom center */
      const pg = data.pageNumber;
      doc.setFontSize(8);
      doc.setFont("helvetica","normal");
      doc.setTextColor(120,120,120);
      doc.text(`Page ${pg}`, PW/2, 291, {align:"center"});
      doc.setTextColor(55,71,79);
    },
  });

  /* Second pass — update page numbers now that totalPages is known */
  const finalTotal = doc.getNumberOfPages();
  for(let p=1; p<=finalTotal; p++){
    doc.setPage(p);
    /* white rectangle to erase old page number */
    doc.setFillColor(255,255,255);
    doc.rect(ML, 287, TW, 8, "F");
    /* rewrite with total */
    doc.setFontSize(8);
    doc.setFont("helvetica","normal");
    doc.setTextColor(120,120,120);
    doc.text(`Page ${p} of ${finalTotal}`, PW/2, 291, {align:"center"});
  }

  const fname = `rapidrankings_${new Date().toISOString().slice(0,10)}.pdf`;
  doc.save(fname);
  showToast(`✅ PDF downloaded — ${filtered.length} records.`);
};

/* ── Init ── */
setDatePill();
loadData();
</script>
